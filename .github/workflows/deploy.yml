name: Deploy

# T10: 手動 dispatch で制御層 + フロントを再現可能にデプロイする。
# AWS 認証は OIDC (GitHub → AWS IAM Role) を前提とし、リポジトリには長期キーを置かない。
# IAM Role の用意 (信頼ポリシーに `token.actions.githubusercontent.com` を許可) は
# デプロイ環境の事前準備として運用者が行う (README に手順あり)。

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "デプロイ先環境 (dev / staging / prod 等)"
        required: true
        default: "dev"
      dry-run:
        description: "true なら cdk diff のみ。false なら cdk deploy + s3 sync まで実行"
        required: true
        default: "true"

# 同一環境への同時 deploy を防ぐ。
concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write # OIDC で AWS にアクセス
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
      DRY_RUN: ${{ github.event.inputs.dry-run }}

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      # GitHub OIDC → AWS Role 引き受け。AWS_DEPLOY_ROLE_ARN は環境変数に登録しておく。
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # SPA を環境非依存にビルドする (API URL/Cognito は焼き込まない)。dist が存在すれば
      # bin/app.ts が webAssets を渡し、cdk deploy 内の BucketDeployment が S3 配信 + config.json
      # 生成 + CloudFront invalidation まで行う (手動 s3 sync は不要)。
      - name: Build
        run: vp run -r build

      - name: CDK diff (制御層 + SPA 配信)
        run: vp run --filter @stagecast/infra cdk -- diff StagecastControlPlane

      - name: CDK deploy (制御層 + SPA 配信)
        if: ${{ env.DRY_RUN == 'false' }}
        run: |
          vp run --filter @stagecast/infra cdk -- deploy StagecastControlPlane \
            --require-approval never \
            --outputs-file infra/cdk-outputs.json

      - name: Summary
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- environment: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- dry-run: ${{ env.DRY_RUN }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ env.DRY_RUN }}" = "false" ]; then
            out=infra/cdk-outputs.json
            echo "- admin-web: $(jq -r '.StagecastControlPlane.AdminWebUrl' $out)" >> $GITHUB_STEP_SUMMARY
            echo "- stage-web: $(jq -r '.StagecastControlPlane.StageWebUrl' $out)" >> $GITHUB_STEP_SUMMARY
            echo "- control-api: $(jq -r '.StagecastControlPlane.ControlApiEndpoint' $out)" >> $GITHUB_STEP_SUMMARY
          fi
