name: Build caddy-sidecar image

# ADR 0016 D-6: Caddy + caddy-dns/route53 + certmagic-s3 のカスタムビルド。
# - pull_request: Dockerfile の健全性確認のため build のみ (AWS 不要)。
# - workflow_dispatch: OIDC で AWS Role を引き受け、ECR (stagecast/caddy-sidecar) に push。

on:
  pull_request:
    paths:
      - "services/caddy-sidecar/**"
      - ".github/workflows/build-caddy-sidecar.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "push 先環境 (dev 等)"
        required: true
        default: "dev"

concurrency:
  group: build-caddy-sidecar-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
      PUSH: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials (OIDC)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute tags
        id: tags
        run: |
          if [ "${{ env.PUSH }}" = "true" ]; then
            reg='${{ steps.ecr.outputs.registry }}'
            echo "tags=${reg}/stagecast/caddy-sidecar:latest,${reg}/stagecast/caddy-sidecar:main-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=stagecast/caddy-sidecar:pr" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (and push on dispatch)
        uses: docker/build-push-action@v7
        with:
          context: services/caddy-sidecar
          file: services/caddy-sidecar/Dockerfile
          push: ${{ env.PUSH == 'true' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
